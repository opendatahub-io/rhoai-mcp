name: MCP Evaluation

on:
  workflow_dispatch:
    inputs:
      judge_provider:
        description: "Judge LLM provider"
        required: false
        default: "google-vertex"
        type: choice
        options:
          - google-vertex
          - google-genai
          - openai
          - vllm
          - azure
          - anthropic
          - anthropic-vertex
      judge_model:
        description: "Judge LLM model for DeepEval metrics"
        required: false
        default: "gemini-2.5-flash"
        type: string
      inference_model:
        description: "Inference model for Llama Stack agent"
        required: false
        default: "meta-llama/Llama-3.1-8B-Instruct"
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event_name == 'issue_comment'
        && format('pr-{0}', github.event.issue.number)
        || github.ref
    }}
  cancel-in-progress: true

jobs:
  eval:
    name: MCP Eval (LCS + Mock Cluster)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.action == 'created' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@run_evals') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )

    env:
      # Judge LLM settings
      RHOAI_EVAL_EVAL_PROVIDER: >-
        ${{ inputs.judge_provider || 'google-vertex' }}
      RHOAI_EVAL_EVAL_MODEL: >-
        ${{ inputs.judge_model || 'gemini-2.5-flash' }}
      RHOAI_EVAL_EVAL_API_KEY: >-
        ${{ (inputs.judge_provider == 'anthropic' || inputs.judge_provider == 'anthropic-vertex')
              && secrets.ANTHROPIC_API_KEY
            || (inputs.judge_provider == 'openai' || inputs.judge_provider == 'vllm' || inputs.judge_provider == 'azure')
              && secrets.OPENAI_API_KEY
            || secrets.GOOGLE_API_KEY }}
      RHOAI_EVAL_VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
      RHOAI_EVAL_VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
      # LCS endpoint (container service)
      RHOAI_EVAL_LCS_URL: http://localhost:8443
      RHOAI_EVAL_RHOAI_MCP_URL: http://localhost:8000
      RHOAI_EVAL_CLUSTER_MODE: mock
      # Inference provider for Llama Stack
      INFERENCE_MODEL: ${{ inputs.inference_model || 'meta-llama/Llama-3.1-8B-Instruct' }}
      INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY || secrets.GOOGLE_API_KEY }}

    steps:
      - name: Acknowledge eval request
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR ref
        if: github.event_name == 'issue_comment'
        id: pr
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName,headRefOid)
          echo "ref=$(echo "$PR_DATA" | jq -r .headRefName)" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo "$PR_DATA" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ steps.pr.outputs.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group eval

      - name: Restore eval history cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: evals/results/eval_history.jsonl
          key: eval-results-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            eval-results-${{ github.ref_name }}-
            eval-results-main-

      - name: Build rhoai-mcp container image
        run: docker build -f Containerfile -t rhoai-mcp:latest .

      - name: Start eval services
        run: |
          docker compose -f docker-compose.eval.yml up -d
          echo "Waiting for services to be healthy..."

      - name: Wait for services healthy
        run: |
          timeout=120
          elapsed=0
          interval=5
          while [ $elapsed -lt $timeout ]; do
            rhoai_ok=$(curl -sf http://localhost:8000/health >/dev/null 2>&1 && echo "yes" || echo "no")
            lcs_ok=$(curl -sf http://localhost:8443/readiness >/dev/null 2>&1 && echo "yes" || echo "no")
            if [ "$rhoai_ok" = "yes" ] && [ "$lcs_ok" = "yes" ]; then
              echo "All services healthy!"
              break
            fi
            echo "Services not ready (rhoai=$rhoai_ok, lcs=$lcs_ok), waiting ${interval}s... ($elapsed/${timeout}s)"
            sleep $interval
            elapsed=$((elapsed + interval))
          done
          if [ "$rhoai_ok" != "yes" ] || [ "$lcs_ok" != "yes" ]; then
            echo "Services did not become healthy within ${timeout}s"
            docker compose -f docker-compose.eval.yml logs
            exit 1
          fi

      - name: Register inference model with llama-stack
        run: |
          MODEL="${INFERENCE_MODEL:-gemini-2.5-flash}"
          echo "Registering model $MODEL with llama-stack..."
          curl -sf -X POST http://localhost:8321/v1/models \
            -H "Content-Type: application/json" \
            -d "{\"model_id\": \"$MODEL\", \"provider_id\": \"gemini\", \"provider_model_id\": \"$MODEL\"}" \
            && echo "Model $MODEL registered." \
            || echo "Model registration returned non-zero (may already exist)."

      - name: Run mock evaluations
        run: uv run pytest evals/ -v -m "eval and not live" --tb=short --reruns 2 --reruns-delay 5 --junitxml=eval-results.xml

      - name: Collect container logs on failure
        if: failure()
        run: docker compose -f docker-compose.eval.yml logs > container-logs.txt 2>&1

      - name: Generate eval report
        if: always()
        run: |
          uv run --group eval python -m evals.reporting.cli summary --format markdown > eval-summary.md
          echo "" >> eval-summary.md
          uv run --group eval python -m evals.reporting.cli trend --last 5 --format markdown >> eval-summary.md
          cat eval-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Post eval results to PR
        if: always() && github.event_name == 'issue_comment'
        run: |
          if [ -f eval-summary.md ]; then
            gh pr comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body-file eval-summary.md
          else
            gh pr comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "Eval run completed but no summary was generated."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: React to comment with result
        if: always() && github.event_name == 'issue_comment'
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            REACTION="rocket"
          else
            REACTION="-1"
          fi
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="$REACTION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tear down services
        if: always()
        run: docker compose -f docker-compose.eval.yml down -v

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: eval-results
          path: |
            eval-results.xml
            evals/results/eval_history.jsonl
            eval-summary.md
            container-logs.txt
