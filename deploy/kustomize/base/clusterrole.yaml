apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhoai-mcp
  labels:
    app.kubernetes.io/name: rhoai-mcp
    app.kubernetes.io/component: rbac
rules:
  # Core Kubernetes resources (read-only)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - serviceaccounts
      - events
      - nodes
      - namespaces
      - secrets
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]

  # Kubeflow Notebooks (read-only)
  - apiGroups: ["kubeflow.org"]
    resources:
      - notebooks
    verbs: ["get", "list", "watch"]

  # Kubeflow Training Operator v2 (read-only)
  - apiGroups: ["trainer.kubeflow.org"]
    resources:
      - trainjobs
      - trainingruntimes
      - clustertrainingruntimes
    verbs: ["get", "list", "watch"]

  # Data Science Pipelines (read-only)
  - apiGroups: ["datasciencepipelinesapplications.opendatahub.io"]
    resources:
      - datasciencepipelinesapplications
    verbs: ["get", "list", "watch"]

  # Model Serving — KServe (read-only)
  - apiGroups: ["serving.kserve.io"]
    resources:
      - inferenceservices
      - servingruntimes
    verbs: ["get", "list", "watch"]

  # Deployments (read-only)
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get", "list", "watch"]

  # Storage Classes (read-only for discovery)
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["list"]
